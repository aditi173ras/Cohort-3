<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A3 | Squid Game UI</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet"/>
</head>
<body>
    <main>
        <nav>
            <div class="left-nav">
                <img src="./Assets/squid_game-logo.png" alt="">
            </div>
            <div class="mid-nav">
                <div class="nav-items">
                    <h4>About</h4>
                    <h4>Watch now</h4>
                    <h4>Actors</h4>
                    <h4>Contact</h4>
                </div>
            </div>
            <div class="right-nav">
                <i class="ri-menu-3-line"></i>
            </div>
        </nav>
        <section>
            <div class="left-box">
                <div class="left-top-box">
                    <img src="./Assets/squid_game-logo.png" alt="">
                    <i id="yellow-star" class="ri-shining-2-fill"></i>
                    <i id="blue-star" class="ri-shining-2-fill"></i>
                </div>
                <div class="left-mid-box">
                    <p>Action / Thriller / Drama Series directed by Dong-hyuk Hwang <br>Season 1: 9 Episodes</p>
                </div>
                <div class="left-btm-box">
                    <div class="btn" id="btn1">
                        <i class="ri-play-fill"></i>
                        <h5>Play Now<h5>
                    </div>
                    <div class="btn" id="btn2">
                        <i class="ri-play-line"></i>
                        <h5>Watch Trailer<h5>
                    </div>
                </div>
                <div class="social-media">
                    <i class="ri-twitter-line"></i>
                    <i class="ri-instagram-line"></i>
                    <i class="ri-facebook-fill"></i>
                </div>
            </div>
        </section>
        <footer>
            <img src="./Assets/b1ackground.jpg" alt="">
            <div class="btm-pic">
                <img src="./Assets/squid-game-guards.jpg" alt="">
                <img src="./Assets/joker.jpg" alt="">
                <img src="./Assets/round-6-.jpg" alt="">   
            </div>
        </footer>
    </main>
</body>
</html>
